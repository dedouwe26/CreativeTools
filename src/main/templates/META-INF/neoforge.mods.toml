modLoader="javafml" #mandatory
loaderVersion="${loader_version_range}" #mandatory

license="${mod_license}"

issueTrackerURL="https://github.com/dedouwe26/CreativeLevitite/issues" #optional

[[mods]] #mandatory

modId="${mod_id}" #mandatory
version="${mod_version}" #mandatory

displayName="${mod_name}" #mandatory
displayURL="https://github.com/dedouwe26/CreativeLevitite" #optional
logoFile="examplemod.png" #optional

authors="0xDED"

description='''
This mod adds an controllable Levitite block for Create: Aeronautics. It allows you to customize the lift generated by this block.
'''

[[mixins]]
config="${mod_id}.mixins.json"

[[dependencies.${mod_id}]]
    modId="neoforge" #mandatory
    type="required" #mandatory
    versionRange="[${neo_version},)" #mandatory
    ordering="NONE"
    side="BOTH"

[[dependencies.${mod_id}]]
    modId="minecraft"
    type="required"
    versionRange="${minecraft_version_range}"
    ordering="NONE"
    side="BOTH"